name: Build and Release canvas-cli

on:
  push:
    branches:
      - main

permissions:
  contents: write

concurrency:
  group: release-canvas-cli-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build (${{ matrix.platform }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
            binary: canvas-cli
          - os: macos-14
            platform: macos-universal
            binary: canvas-cli
          - os: windows-latest
            platform: windows-x64
            target: x86_64-pc-windows-msvc
            binary: canvas-cli.exe

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Add Rust target
        if: matrix.platform != 'macos-universal'
        run: rustup target add ${{ matrix.target }}

      - name: Add Rust targets (macOS universal)
        if: matrix.platform == 'macos-universal'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin

      - name: Build release binary
        if: matrix.platform != 'macos-universal'
        run: cargo build --release -p canvas-cli --target ${{ matrix.target }}

      - name: Build release binaries (macOS universal)
        if: matrix.platform == 'macos-universal'
        run: |
          cargo build --release -p canvas-cli --target aarch64-apple-darwin
          cargo build --release -p canvas-cli --target x86_64-apple-darwin

      - name: Package binary (macOS universal)
        if: matrix.platform == 'macos-universal'
        run: |
          mkdir -p dist
          lipo -create \
            target/aarch64-apple-darwin/release/${{ matrix.binary }} \
            target/x86_64-apple-darwin/release/${{ matrix.binary }} \
            -output dist/${{ matrix.binary }}
          cp SKILL.md dist/
          cd dist
          zip -r ../canvas-cli-${{ matrix.platform }}.zip ${{ matrix.binary }} SKILL.md

      - name: Package binary (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/${{ matrix.binary }} dist/
          cp SKILL.md dist/
          cd dist
          zip -r ../canvas-cli-${{ matrix.platform }}.zip ${{ matrix.binary }} SKILL.md

      - name: Package binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Copy-Item target/${{ matrix.target }}/release/${{ matrix.binary }} dist/${{ matrix.binary }}
          Copy-Item SKILL.md dist/SKILL.md
          Compress-Archive -Path dist/${{ matrix.binary }},dist/SKILL.md -DestinationPath canvas-cli-${{ matrix.platform }}.zip -Force

      - name: Upload zipped artifact
        uses: actions/upload-artifact@v4
        with:
          name: asset-${{ matrix.platform }}
          path: canvas-cli-${{ matrix.platform }}.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: asset-*
          path: release-artifacts
          merge-multiple: true

      - name: Create release and upload assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: main-${{ github.run_number }}-${{ github.sha }}
          name: canvas-cli main build #${{ github.run_number }}
          files: release-artifacts/*.zip
          generate_release_notes: true
          fail_on_unmatched_files: true
          target_commitish: ${{ github.sha }}
          make_latest: false
